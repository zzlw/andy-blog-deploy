# =============================================================
# 公共 TLS / HTTP3 配置：所有 443 server 块 include 本文件
# 证书为单张 SAN 证书（覆盖 blog/api/admin 全部域名），路径固定，
# 由 acme.sh 自动续期后重装，换证书无需改 nginx 配置
# =============================================================

ssl_certificate     /etc/nginx/certs/live/fullchain.pem;
ssl_certificate_key /etc/nginx/certs/live/privkey.pem;

# HTTP/3 (QUIC) 强制 TLS 1.3；TLS 1.2 保留给老客户端的 TCP 连接
ssl_protocols TLSv1.2 TLSv1.3;
ssl_prefer_server_ciphers off;
ssl_session_cache shared:SSL:10m;
ssl_session_timeout 1d;
ssl_session_tickets off;

# 告知浏览器本站支持 HTTP/3，下次连接升级为 QUIC
add_header Alt-Svc 'h3=":443"; ma=86400' always;
# HSTS：6 个月内浏览器强制走 HTTPS
add_header Strict-Transport-Security "max-age=15768000" always;
