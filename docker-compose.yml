# =============================================================
# 基础编排文件（环境无关的服务拓扑定义）
# - 开发：docker compose up（自动叠加 docker-compose.override.yml）
# - 生产：docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d
# 服务间通信一律使用容器服务名（mongo / redis / api / web / admin）
# =============================================================
services:
  mongo:
    image: mongo:7
    environment:
      TZ: Asia/Shanghai
    volumes:
      - mongo-data:/data/db
    healthcheck:
      test: ["CMD-SHELL", "mongosh --quiet --eval \"db.runCommand('ping').ok\" || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 12
    networks:
      - blog

  redis:
    image: redis:7-alpine
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 12
    networks:
      - blog

  # 自托管访客统计（Umami）：采集端与读数端均在本机，规避海外 API 不可达
  # 专用 PostgreSQL，与业务库（mongo）隔离
  umami-db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: umami
      POSTGRES_USER: umami
      POSTGRES_PASSWORD: ${UMAMI_DB_PASSWORD}
      TZ: Asia/Shanghai
    volumes:
      - umami-db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U umami -d umami"]
      interval: 5s
      timeout: 3s
      retries: 12
    networks:
      - blog

  # Umami 应用：对外经网关暴露（埋点脚本 + 控制台），后端经内网 http://umami:3000 读数
  umami:
    image: ghcr.io/umami-software/umami:postgresql-latest
    environment:
      DATABASE_URL: postgresql://umami:${UMAMI_DB_PASSWORD}@umami-db:5432/umami
      DATABASE_TYPE: postgresql
      APP_SECRET: ${UMAMI_APP_SECRET}
      DISABLE_TELEMETRY: 1
      TZ: Asia/Shanghai
    depends_on:
      umami-db:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3000/api/heartbeat >/dev/null 2>&1 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 12
    networks:
      - blog

  # 后端 API（NestJS，andy-blog-koa 仓库 main 分支）
  # 生产：从镜像仓库拉取 CI 构建的镜像（tag 由部署脚本写入 env）
  # 开发：docker-compose.override.yml 覆盖为本地源码构建
  api:
    image: ${REGISTRY:-andy-blog}/andy-blog-api:${API_TAG:-latest}
    environment:
      PORT: 3000
      MONGO_URI: mongodb://mongo:27017/andy_blog
      REDIS_URI: redis://redis:6379
      JWT_SECRET: ${JWT_SECRET}
      # 空库启动时自动创建的超管账号/密码（库里有作者则忽略；不配置则用开发默认值 admin/admin123456）
      ADMIN_INIT_NAME: ${ADMIN_INIT_NAME:-}
      ADMIN_INIT_PASSWORD: ${ADMIN_INIT_PASSWORD:-}
      S3_ENDPOINT: ${S3_ENDPOINT}
      S3_REGION: ${S3_REGION:-us-east-1}
      S3_ACCESS_KEY_ID: ${S3_ACCESS_KEY_ID}
      S3_SECRET_ACCESS_KEY: ${S3_SECRET_ACCESS_KEY}
      S3_BUCKET: ${S3_BUCKET}
      S3_PUBLIC_URL: ${S3_PUBLIC_URL}
      S3_FORCE_PATH_STYLE: ${S3_FORCE_PATH_STYLE:-true}
      # 站点信息（用于 AI 知识库的站点/作者上下文与文章 URL 生成）
      SITE_NAME: ${SITE_NAME:-}
      SITE_URL: ${SITE_URL:-}
      SITE_DESCRIPTION: ${SITE_DESCRIPTION:-}
      SITE_KEYWORDS: ${SITE_KEYWORDS:-}
      # 内容变更 Webhook → AI 知识库服务（andy-blog-ai / Cloudflare Workers）
      # 二者留空则自动禁用同步，不影响主流程
      WEBHOOK_ENDPOINT: ${WEBHOOK_ENDPOINT:-}
      WEBHOOK_SECRET: ${WEBHOOK_SECRET:-}
      # 访客统计（后台看板「访客统计」图）：经内网调用自托管 Umami REST API
      # WEBSITE_ID 非敏感放 .env.production；读数账号密码放 .env.production.local
      # 任一项留空则接口降级，看板展示配置引导
      UMAMI_API_URL: http://umami:3000
      UMAMI_WEBSITE_ID: ${UMAMI_WEBSITE_ID:-}
      UMAMI_USERNAME: ${UMAMI_API_USERNAME:-}
      UMAMI_PASSWORD: ${UMAMI_API_PASSWORD:-}
      UMAMI_CACHE_TTL: ${UMAMI_CACHE_TTL:-3600}
    depends_on:
      mongo:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - blog

  # 博客前台 SSR（andy-blog-nuxt）
  web:
    image: ${REGISTRY:-andy-blog}/andy-blog-web:${WEB_TAG:-latest}
    environment:
      # 浏览器侧走对外地址，SSR 数据预取走容器内网，互不干扰（Nuxt runtimeConfig）
      NUXT_PUBLIC_API_BASE: ${API_BASE_URL}
      NUXT_API_BASE_INTERNAL: http://api:3000
      NUXT_PUBLIC_STATIC_PATH: ${STATIC_PATH}
      # AI 对话助手服务地址（Cloudflare Workers）；留空则前台不渲染 AI 浮窗
      NUXT_PUBLIC_AI_API_BASE: ${AI_API_BASE:-}
      # 自托管 Umami 埋点：脚本地址 + 网站 ID；任一留空则前台不加载统计脚本
      NUXT_PUBLIC_UMAMI_SCRIPT_URL: ${UMAMI_SCRIPT_URL:-}
      NUXT_PUBLIC_UMAMI_WEBSITE_ID: ${UMAMI_WEBSITE_ID:-}
    depends_on:
      - api
    networks:
      - blog

  # 后台管理 SPA（andy-blog-admin）
  admin:
    image: ${REGISTRY:-andy-blog}/andy-blog-admin:${ADMIN_TAG:-latest}
    environment:
      # 容器启动时渲染进 app-config.js，构建产物与环境解耦
      API_BASE_URL: ${API_BASE_URL}
      STATIC_PATH: ${STATIC_PATH}
      AI_API_BASE: ${AI_API_BASE:-}
      NGINX_PORT: 80
    depends_on:
      - api
    networks:
      - blog

networks:
  blog:
    driver: bridge

volumes:
  mongo-data:
  redis-data:
  umami-db-data:
